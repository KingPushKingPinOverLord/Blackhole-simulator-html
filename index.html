<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Relativistic Accretion Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-panel: rgba(8, 10, 15, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00e5ff;
            --accent-red: #ff2a55;
            --text-main: #e2e8f0;
            --text-muted: #8b9bb4;
        }

        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-main);
            user-select: none;
        }
        
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            display: block; 
        }
        #glCanvas { cursor: crosshair; }
        #uiCanvas { pointer-events: none; z-index: 5; }

        .panel {
            position: absolute;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 24px;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .left-panel { top: 32px; left: 32px; width: 280px; border-radius: 4px 16px 16px 16px; }
        .right-panel { top: 32px; right: 32px; width: 260px; border-radius: 16px 4px 16px 16px; }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), transparent);
            border-radius: 16px 16px 0 0;
            opacity: 0.5;
        }
        .right-panel::before {
            background: linear-gradient(-90deg, var(--accent-cyan), transparent);
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 700;
            margin: 0 0 24px 0;
            color: #fff;
            display: flex;
            align-items: center;
        }
        h1::before {
            content: '';
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--accent-cyan);
            margin-right: 12px;
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        h2 {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 0 0 16px 0;
            font-weight: 600;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 16px;
            margin-bottom: 20px;
        }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { 
            font-size: 9px; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 6px; 
        }
        .stat-value { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px; 
            font-weight: 400; 
        }
        .stat-value.highlight { color: var(--accent-cyan); text-shadow: 0 0 8px rgba(0, 229, 255, 0.4); }

        #warning {
            color: var(--accent-red);
            font-size: 10px;
            letter-spacing: 1.5px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
        }
        #warning::before { content: "⚠"; margin-right: 8px; font-size: 14px; }
        #warning.active { opacity: 1; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { text-shadow: 0 0 0 rgba(255, 42, 85, 0); }
            50% { text-shadow: 0 0 12px rgba(255, 42, 85, 0.6); }
            100% { text-shadow: 0 0 0 rgba(255, 42, 85, 0); }
        }

        .control-group { margin-bottom: 20px; }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .control-group label span {
            font-family: 'JetBrains Mono', monospace;
            color: #fff;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
        }
        input[type=range]::-webkit-slider-thumb {
            height: 12px;
            width: 12px;
            border-radius: 0;
            background: var(--text-main);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -5px;
            transition: background 0.2s, transform 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            background: var(--accent-cyan);
            transform: scale(1.2);
        }

        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            outline: none;
            cursor: pointer;
        }

        .instructions {
            margin-top: 24px;
            font-size: 10px;
            color: var(--text-muted);
            line-height: 1.8;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
        .instructions span { color: #fff; font-weight: 600; padding: 2px 6px; background: rgba(255,255,255,0.1); border-radius: 3px; }
        
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 20px; height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            opacity: 0.3;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #fff;
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 1px; }
        #crosshair::after { top: 0; left: 9px; width: 1px; height: 20px; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="panel left-panel">
            <h1>Engine_Telemetry</h1>
            
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="stat-label">Observer Dist</div>
                    <div class="stat-value" id="stat-dist">0.00 M</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Local Gravity</div>
                    <div class="stat-value" id="stat-grav">0.000 G</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Time Dilation</div>
                    <div class="stat-value highlight" id="stat-time">100.0%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Horizon Rad</div>
                    <div class="stat-value" id="stat-eh">0.0 M</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Active Orbs</div>
                    <div class="stat-value highlight" id="stat-orbs">0</div>
                </div>
            </div>
            
            <div id="warning">Spaghettification Imminent</div>
        </div>

        <div class="panel right-panel">
            <h1>Singularity_Ctrl</h1>
            
            <div class="control-group">
                <label>Singularity Mass <span id="lbl-mass">1.50</span></label>
                <input type="range" id="mass-slider" min="0.5" max="3.5" step="0.05" value="1.5">
            </div>
            
            <div class="control-group">
                <label>Emission Intensity <span id="lbl-intensity">1.0x</span></label>
                <input type="range" id="intensity-slider" min="0.2" max="3.0" step="0.1" value="1.0">
            </div>

            <div class="control-group">
                <label style="margin-bottom: 10px;">Spectral Mapping</label>
                <select id="mode-select">
                    <option value="0">Thermal Blackbody</option>
                    <option value="1">Relativistic Redshift</option>
                </select>
            </div>
            
            <div class="instructions">
                <span>Left Click</span> Inject Test Orb<br><br>
                <span>Drag</span> Orbit Camera<br><br>
                <span>Scroll</span> Adjust Distance
            </div>
        </div>
    </div>

    <div id="crosshair"></div>

    <canvas id="glCanvas"></canvas>
    <canvas id="uiCanvas"></canvas>

    <script id="fs" type="x-shader/x-fragment">
        precision highp float;

        uniform vec2 u_res;
        uniform vec3 u_camPos;
        uniform vec3 u_camDir;
        uniform vec3 u_camUp;
        uniform float u_time;
        uniform float u_bhMass;
        uniform int u_visMode;
        uniform float u_diskIntensity;

        #define MAX_STEPS 200
        #define DISK_IN 2.8
        #define DISK_OUT 9.0

        float hash(vec3 p) {
            return fract(sin(dot(p, vec3(12.9, 78.2, 54.1))) * 43758.5);
        }

        float getDiskTexture(vec3 p, float r) {
            float temp = 1.0 - smoothstep(DISK_IN, DISK_OUT, r);
            float turb = 0.5 + 0.5 * sin(r * 8.0 + u_time * 0.1) * sin(atan(p.z, p.x) * 6.0);
            float rings = 0.6 + 0.4 * sin(r * 12.0);
            rings = smoothstep(0.1, 0.9, rings);
            return (temp * 0.7 + turb * 0.3) * rings;
        }

        vec3 temperatureToColor(float temp) {
            if(temp < 0.3) return mix(vec3(0.2, 0.05, 0.0), vec3(0.8, 0.2, 0.05), temp / 0.3);
            else if(temp < 0.7) return mix(vec3(0.8, 0.2, 0.05), vec3(1.0, 0.9, 0.4), (temp - 0.3) / 0.4);
            else return mix(vec3(1.0, 0.9, 0.4), vec3(1.0, 1.0, 1.0), (temp - 0.7) / 0.3);
        }

        void main() {
            vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / u_res.y;
            
            vec3 fwd = normalize(u_camDir);
            vec3 right = normalize(cross(fwd, u_camUp));
            vec3 up = cross(right, fwd);
            vec3 rd = normalize(uv.x * right + uv.y * up + 1.5 * fwd);
            
            vec3 p = u_camPos;
            vec3 col = vec3(0.0);
            vec3 accumGlow = vec3(0.0);
            bool hitHorizon = false;

            for(int i = 0; i < MAX_STEPS; i++) {
                float r = length(p);
                
                if(r < u_bhMass) {
                    hitHorizon = true;
                    break;
                }
                
                float force = (u_bhMass * 2.5) / (r * r);
                vec3 gravity = normalize(-p);
                rd += gravity * force * 0.05;
                rd = normalize(rd);
                
                float dPlane = abs(p.y);
                
                if(dPlane < 0.2 && r > DISK_IN && r < DISK_OUT) {
                    float tex = getDiskTexture(p, r);
                    vec3 vel = normalize(vec3(-p.z, 0.0, p.x));
                    float dop = dot(rd, vel);
                    float temp = 1.0 - smoothstep(DISK_IN, DISK_OUT, r);
                    
                    vec3 pixelCol;
                    if(u_visMode == 1) {
                        pixelCol = vec3(1.0 - temp, 0.5, temp);
                    } else {
                        pixelCol = temperatureToColor(temp);
                    }
                    
                    float redshift = 1.0 + 0.3 * (u_bhMass / r);
                    pixelCol *= vec3(1.0 / redshift, 0.9 / (redshift * 0.7), 0.8 / (redshift * 1.2));
                    
                    float density = tex * exp(-dPlane * 10.0);
                    float beam = pow(1.0 + dop * 0.7, 2.0);
                    vec3 light = pixelCol * density * beam * 0.35 * u_diskIntensity;
                    accumGlow += light;
                }
                
                float step = max(0.05, r * 0.06);
                p += rd * step;
                
                if(r > 100.0) break;
            }
            
            if(!hitHorizon) {
                vec3 starDir = rd * 100.0;
                float s = hash(floor(starDir));
                if(s > 0.985) {
                    float brightness = pow(fract(s * 13.7), 2.0);
                    col += vec3(brightness);
                }
            }
            
            col += accumGlow;
            col = col / (col + vec3(0.5));
            col = pow(col, vec3(0.4545));
            
            gl_FragColor = vec4(col, 1.0);
        }
    </script>
    
    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 position;
        void main() { gl_Position = vec4(position, 0.0, 1.0); }
    </script>

    <script>
        const normalize = (v) => {
            const len = Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]);
            return len > 0 ? [v[0]/len, v[1]/len, v[2]/len] : [0,0,0];
        };
        const cross = (a, b) => [
            a[1]*b[2] - a[2]*b[1],
            a[2]*b[0] - a[0]*b[2],
            a[0]*b[1] - a[1]*b[0]
        ];

        const glCanvas = document.getElementById("glCanvas");
        const uiCanvas = document.getElementById("uiCanvas");
        const gl = glCanvas.getContext("webgl");
        const ctx2d = uiCanvas.getContext("2d");

        function createShader(type, src) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
            return s;
        }
        
        const prog = gl.createProgram();
        gl.attachShader(prog, createShader(gl.VERTEX_SHADER, document.getElementById("vs").text));
        gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, document.getElementById("fs").text));
        gl.linkProgram(prog);
        gl.useProgram(prog);

        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        const posLoc = gl.getAttribLocation(prog, "position");
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

        const uLocs = {
            res: gl.getUniformLocation(prog, "u_res"),
            pos: gl.getUniformLocation(prog, "u_camPos"),
            dir: gl.getUniformLocation(prog, "u_camDir"),
            up: gl.getUniformLocation(prog, "u_camUp"),
            time: gl.getUniformLocation(prog, "u_time"),
            bhMass: gl.getUniformLocation(prog, "u_bhMass"),
            visMode: gl.getUniformLocation(prog, "u_visMode"),
            diskIntensity: gl.getUniformLocation(prog, "u_diskIntensity")
        };

        const cam = { r: 22.0, theta: Math.PI / 2.2, phi: 0.4 };
        let bhMass = 1.5;
        let visMode = 0;
        let diskIntensity = 1.0;
        let particles = [];
        
        let isDragging = false;
        let lastX = 0, lastY = 0;
        let dragDistance = 0;
        let startTime = Date.now();

        document.getElementById('mass-slider').addEventListener('input', e => {
            bhMass = parseFloat(e.target.value);
            document.getElementById('lbl-mass').textContent = bhMass.toFixed(2);
        });
        
        document.getElementById('intensity-slider').addEventListener('input', e => {
            diskIntensity = parseFloat(e.target.value);
            document.getElementById('lbl-intensity').textContent = diskIntensity.toFixed(1) + 'x';
        });

        document.getElementById('mode-select').addEventListener('change', e => {
            visMode = parseInt(e.target.value);
        });

        glCanvas.addEventListener('mousedown', e => {
            isDragging = true;
            lastX = e.clientX; lastY = e.clientY;
            dragDistance = 0;
        });

        window.addEventListener('mouseup', e => {
            if(isDragging && dragDistance < 5) {
                const p = launchOrb(e.clientX, e.clientY);
                particles.push(p);
            }
            isDragging = false;
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            dragDistance += Math.sqrt(dx*dx + dy*dy);
            lastX = e.clientX;
            lastY = e.clientY;
            
            cam.phi -= dx * 0.005;
            cam.theta -= dy * 0.005;
            cam.theta = Math.max(0.1, Math.min(Math.PI - 0.1, cam.theta));
        });

        window.addEventListener('wheel', e => {
            cam.r += e.deltaY * 0.015;
            cam.r = Math.max(4.0, Math.min(60.0, cam.r));
        });

        function launchOrb(clientX, clientY) {
            const cx = cam.r * Math.sin(cam.theta) * Math.sin(cam.phi);
            const cy = cam.r * Math.cos(cam.theta);
            const cz = cam.r * Math.sin(cam.theta) * Math.cos(cam.phi);
            
            let fx = -cx, fy = -cy, fz = -cz;
            const fl = Math.sqrt(fx*fx + fy*fy + fz*fz);
            fx/=fl; fy/=fl; fz/=fl;

            let rx = fz, ry = 0, rz = -fx;
            const rl = Math.sqrt(rx*rx + ry*ry + rz*rz);
            rx/=rl; ry/=rl; rz/=rl;

            let ux = ry*fz - rz*fy;
            let uy = rz*fx - rx*fz;
            let uz = rx*fy - ry*fx;
            
            const aspect = glCanvas.width / glCanvas.height;
            const screenX = ((clientX / glCanvas.width) - 0.5) * 2.0 * aspect;
            const screenY = -((clientY / glCanvas.height) - 0.5) * 2.0;
            
            let dx = rx * screenX + ux * screenY + fx * 1.5;
            let dy = ry * screenX + uy * screenY + fy * 1.5;
            let dz = rz * screenX + uz * screenY + fz * 1.5;
            
            const ray = normalize([dx, dy, dz]);
            const spawnDist = cam.r * 0.5; 
            const startPos = [cx + ray[0]*spawnDist, cy + ray[1]*spawnDist, cz + ray[2]*spawnDist];
            
            const gravDir = normalize([-startPos[0], -startPos[1], -startPos[2]]);
            let tangent = cross(gravDir, [0, 1, 0]);
            if(Math.sqrt(tangent[0]*tangent[0] + tangent[2]*tangent[2]) < 0.1) tangent = cross(gravDir, [1, 0, 0]);
            tangent = normalize(tangent);
            
            const orbitalSpeed = Math.sqrt(bhMass / Math.max(0.1, Math.sqrt(startPos[0]*startPos[0]+startPos[1]*startPos[1]+startPos[2]*startPos[2]))) * 0.7; 

            return {
                pos: startPos,
                vel: [tangent[0]*orbitalSpeed, (Math.random()-0.5)*0.05, tangent[2]*orbitalSpeed]
            };
        }

        function updateParticles() {
            for(let p of particles) {
                const dist = Math.sqrt(p.pos[0]*p.pos[0] + p.pos[1]*p.pos[1] + p.pos[2]*p.pos[2]);
                const pull = -bhMass * 2.0 / (dist * dist); 
                
                p.vel[0] += (p.pos[0] / dist) * pull * 0.03;
                p.vel[1] += (p.pos[1] / dist) * pull * 0.03;
                p.vel[2] += (p.pos[2] / dist) * pull * 0.03;
                
                p.vel[0] *= 0.995; 
                p.vel[1] *= 0.995;
                p.vel[2] *= 0.995;

                p.pos[0] += p.vel[0];
                p.pos[1] += p.vel[1];
                p.pos[2] += p.vel[2];
            }
            
            particles = particles.filter(p => Math.sqrt(p.pos[0]*p.pos[0] + p.pos[1]*p.pos[1] + p.pos[2]*p.pos[2]) > bhMass * 1.01);
        }

        function project3D(p3d, cx, cy, cz, fx, fy, fz, rx, ry, rz, ux, uy, uz) {
            const relPos = [ p3d[0] - cx, p3d[1] - cy, p3d[2] - cz ];
            const pZ = relPos[0] * fx + relPos[1] * fy + relPos[2] * fz;
            if (pZ < 0.1) return null; 
            
            const pX = relPos[0] * rx + relPos[1] * ry + relPos[2] * rz;
            const pY = relPos[0] * ux + relPos[1] * uy + relPos[2] * uz;
            
            return {
                x: uiCanvas.width / 2 + (pX / pZ) * uiCanvas.height / 1.5,
                y: uiCanvas.height / 2 - (pY / pZ) * uiCanvas.height / 1.5
            };
        }

        function resize() {
            glCanvas.width = window.innerWidth;
            glCanvas.height = window.innerHeight;
            gl.viewport(0, 0, glCanvas.width, glCanvas.height);
            uiCanvas.width = window.innerWidth;
            uiCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function updateStats() {
            const cx = cam.r * Math.sin(cam.theta) * Math.sin(cam.phi);
            const cy = cam.r * Math.cos(cam.theta);
            const cz = cam.r * Math.sin(cam.theta) * Math.cos(cam.phi);
            const distance = Math.sqrt(cx*cx + cy*cy + cz*cz);
            
            const schwarzschildR = bhMass; 
            const timeDialation = Math.sqrt(Math.max(0.001, 1 - schwarzschildR / distance));
            const gravity = (bhMass) / (distance * distance);
            
            document.getElementById('stat-dist').textContent = distance.toFixed(2) + ' M';
            document.getElementById('stat-grav').textContent = gravity.toFixed(3) + ' G';
            document.getElementById('stat-time').textContent = (timeDialation * 100).toFixed(1) + '%';
            document.getElementById('stat-eh').textContent = schwarzschildR.toFixed(2) + ' M';
            document.getElementById('stat-orbs').textContent = particles.length;
            
            const warning = document.getElementById('warning');
            if(distance < 4.0) warning.classList.add('active');
            else warning.classList.remove('active');
        }

        function loop() {
            updateParticles();
            ctx2d.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
            
            const cx = cam.r * Math.sin(cam.theta) * Math.sin(cam.phi);
            const cy = cam.r * Math.cos(cam.theta);
            const cz = cam.r * Math.sin(cam.theta) * Math.cos(cam.phi);
            
            let fx = -cx, fy = -cy, fz = -cz;
            const fl = Math.sqrt(fx*fx + fy*fy + fz*fz);
            fx/=fl; fy/=fl; fz/=fl;

            let rx = fz, ry = 0, rz = -fx;
            const rl = Math.sqrt(rx*rx + ry*ry + rz*rz);
            rx/=rl; ry/=rl; rz/=rl;

            let ux = ry*fz - rz*fy;
            let uy = rz*fx - rx*fz;
            let uz = rx*fy - ry*fx;

            gl.uniform2f(uLocs.res, glCanvas.width, glCanvas.height);
            gl.uniform3f(uLocs.pos, cx, cy, cz);
            gl.uniform3f(uLocs.dir, fx, fy, fz);
            gl.uniform3f(uLocs.up, ux, uy, uz);
            gl.uniform1f(uLocs.time, (Date.now() - startTime) * 0.001);
            gl.uniform1f(uLocs.bhMass, bhMass);
            gl.uniform1i(uLocs.visMode, visMode);
            gl.uniform1f(uLocs.diskIntensity, diskIntensity);
            
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            
            for(let p of particles) {
                const r = Math.sqrt(p.pos[0]*p.pos[0] + p.pos[1]*p.pos[1] + p.pos[2]*p.pos[2]);
                
                const rsFactor = Math.max(0, Math.min(1.0, bhMass / r)); 
                const intensity = 1.0 - Math.pow(rsFactor, 3.0);
                const alpha = Math.max(0, intensity);
                if (alpha <= 0.01) continue; 
                
                const colorR = Math.floor(255 * (1.0 - Math.pow(rsFactor, 6.0)));
                const colorG = Math.floor(255 * Math.pow(1.0 - rsFactor, 1.5));
                const colorB = Math.floor(255 * Math.pow(1.0 - rsFactor, 4.0));

                const stretch = 1.0 + Math.pow(bhMass / r, 3.0) * 150.0;
                const length3D = 0.15 * stretch;
                const dir = normalize(p.pos);
                
                const frontPos = [p.pos[0] - dir[0]*length3D, p.pos[1] - dir[1]*length3D, p.pos[2] - dir[2]*length3D];
                const backPos  = [p.pos[0] + dir[0]*length3D, p.pos[1] + dir[1]*length3D, p.pos[2] + dir[2]*length3D];
                
                const proj1 = project3D(frontPos, cx,cy,cz, fx,fy,fz, rx,ry,rz, ux,uy,uz);
                const proj2 = project3D(backPos,  cx,cy,cz, fx,fy,fz, rx,ry,rz, ux,uy,uz);
                
                if(proj1 && proj2) {
                    const thickness = Math.max(0.5, 6.0 / Math.sqrt(stretch));
                    
                    ctx2d.beginPath();
                    ctx2d.moveTo(proj1.x, proj1.y);
                    ctx2d.lineTo(proj2.x, proj2.y);
                    
                    ctx2d.strokeStyle = `rgba(${colorR}, ${colorG}, ${colorB}, ${alpha})`;
                    ctx2d.lineWidth = thickness;
                    ctx2d.lineCap = "round";
                    ctx2d.shadowBlur = 15 * alpha;
                    ctx2d.shadowColor = `rgba(${colorR}, ${colorG}, ${colorB}, 1.0)`;
                    ctx2d.stroke();
                    
                    if (stretch < 5.0) {
                        const coreProj = project3D(p.pos, cx,cy,cz, fx,fy,fz, rx,ry,rz, ux,uy,uz);
                        if (coreProj) {
                            ctx2d.beginPath();
                            ctx2d.arc(coreProj.x, coreProj.y, Math.max(1, thickness * 0.5), 0, Math.PI * 2);
                            ctx2d.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                            ctx2d.fill();
                        }
                    }
                }
            }
            
            ctx2d.shadowBlur = 0;
            
            updateStats();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
