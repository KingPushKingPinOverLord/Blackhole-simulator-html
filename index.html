<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Schwarzschild Ring Singularity</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui {
            position: absolute; bottom: 30px; width: 100%;
            text-align: center; color: rgba(255, 255, 255, 0.5);
            pointer-events: none; font-size: 14px; letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="ui">
        Left Click + Drag: Orbit Camera &nbsp;&bull;&nbsp; Scroll: Zoom
    </div>

    <canvas id="glCanvas"></canvas>

    <script id="fs" type="x-shader/x-fragment">
        precision highp float;

        uniform vec2 u_res;
        uniform vec3 u_camPos;
        uniform vec3 u_camDir;
        uniform vec3 u_camUp;

        // PHYSICS CONSTANTS
        #define MAX_STEPS 100
        #define BH_MASS 1.5
        #define DISK_IN 2.8
        #define DISK_OUT 9.0
        #define RING_FREQ 15.0 // How many rings

        // --- PROCEDURAL TEXTURE: SHARP RINGS ---
        float getDiskTexture(vec3 p) {
            float r = length(p);
            
            // Basic Concentric Rings (Sine wave)
            float rings = 0.5 + 0.5 * sin(r * RING_FREQ);
            
            // Sharpen the rings (Threshold)
            rings = smoothstep(0.2, 0.8, rings);
            
            // Add a few "gaps" (Cassini divisions)
            float gap1 = smoothstep(0.05, 0.1, abs(r - 4.5));
            float gap2 = smoothstep(0.05, 0.1, abs(r - 6.5));
            
            return rings * gap1 * gap2;
        }

        void main() {
            vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / u_res.y;
            
            // --- CAMERA VIEW MATRIX ---
            vec3 fwd = normalize(u_camDir);
            vec3 right = normalize(cross(fwd, u_camUp));
            vec3 up = cross(right, fwd);
            vec3 rd = normalize(uv.x * right + uv.y * up + 1.5 * fwd);
            
            vec3 p = u_camPos;
            vec3 col = vec3(0.0);
            vec3 accumGlow = vec3(0.0);
            
            bool hitHorizon = false;

            // --- RELATIVISTIC RAY MARCHING ---
            for(int i = 0; i < MAX_STEPS; i++) {
                float r = length(p);
                
                // 1. EVENT HORIZON CHECK (ABSOLUTE BLACK)
                if(r < BH_MASS) {
                    hitHorizon = true;
                    // We hit the core. Stop immediately.
                    // Do NOT add background stars.
                    // Keep whatever 'accumGlow' we collected from the FOREGROUND disk.
                    break;
                }
                
                // 2. GRAVITY BENDING (The Lensing)
                // Curve the ray vector 'rd' towards (0,0,0)
                float force = (BH_MASS * 2.5) / (r * r);
                vec3 gravity = normalize(-p);
                rd += gravity * force * 0.05;
                rd = normalize(rd);
                
                // 3. ACCRETION DISK (The Rings)
                // Check intersection with Y=0 plane
                float dPlane = abs(p.y);
                
                if(dPlane < 0.2 && r > DISK_IN && r < DISK_OUT) {
                    // Texture Mapping
                    float tex = getDiskTexture(p);
                    
                    // Relativistic Doppler Beaming (Bright/Dim sides)
                    // Disk velocity is tangent (-z, 0, x)
                    vec3 vel = normalize(vec3(-p.z, 0.0, p.x));
                    float dop = dot(rd, vel);
                    
                    // Colors
                    vec3 cHot = vec3(1.0, 0.9, 0.7); // Bright Gold
                    vec3 cCold = vec3(0.8, 0.3, 0.0); // Dark Orange
                    vec3 pixelCol = mix(cCold, cHot, dop * 0.5 + 0.5);
                    
                    // Intensity Math
                    // dPlane fade creates the "thin" look
                    float density = tex * exp(-dPlane * 10.0);
                    // Beaming makes approaching side brighter
                    float beam = pow(1.0 + dop * 0.7, 2.0);
                    
                    // Accumulate
                    vec3 light = pixelCol * density * beam * 0.3;
                    accumGlow += light;
                }
                
                // Move Ray
                // Smaller steps near gravity well for accuracy
                float step = max(0.05, r * 0.06); 
                p += rd * step;
                
                if(r > 40.0) break; // Escaped to space
            }
            
            // --- COMPOSITING ---
            
            // Only draw background stars if we DIDN'T hit the black hole
            if(!hitHorizon) {
                // Simple Starfield
                // Note: 'rd' is bent, so stars naturally warp around the shadow!
                vec3 starDir = rd * 100.0;
                float s = fract(sin(dot(floor(starDir), vec3(12.9, 78.2, 54.1))) * 43758.5);
                if(s > 0.99) col += vec3(0.8);
            }
            
            // Add the glowing rings on top
            col += accumGlow;
            
            // Tone Mapping for Cinema Look
            col = col / (col + vec3(0.5));
            col = pow(col, vec3(0.4545)); // Gamma
            
            gl_FragColor = vec4(col, 1.0);
        }
    </script>
    
    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 position;
        void main() { gl_Position = vec4(position, 0.0, 1.0); }
    </script>

    <script>
        const canvas = document.getElementById("glCanvas");
        const gl = canvas.getContext("webgl");

        // --- SHADER SETUP ---
        function createShader(type, src) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
            return s;
        }
        const prog = gl.createProgram();
        gl.attachShader(prog, createShader(gl.VERTEX_SHADER, document.getElementById("vs").text));
        gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, document.getElementById("fs").text));
        gl.linkProgram(prog);
        gl.useProgram(prog);

        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        const posLoc = gl.getAttribLocation(prog, "position");
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

        const uLocs = {
            res: gl.getUniformLocation(prog, "u_res"),
            pos: gl.getUniformLocation(prog, "u_camPos"),
            dir: gl.getUniformLocation(prog, "u_camDir"),
            up: gl.getUniformLocation(prog, "u_camUp")
        };

        // --- ORBIT CONTROLS ---
        const cam = {
            r: 18.0,
            theta: Math.PI / 2, // Vertical angle
            phi: 0.0            // Horizontal angle
        };

        let isDragging = false;
        let lastX = 0, lastY = 0;

        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            lastX = e.clientX;
            lastY = e.clientY;

            cam.phi -= dx * 0.005;
            cam.theta -= dy * 0.005;

            // Clamp vertical angle to avoid flipping
            cam.theta = Math.max(0.1, Math.min(Math.PI - 0.1, cam.theta));
        });

        window.addEventListener('wheel', e => {
            cam.r += e.deltaY * 0.01;
            cam.r = Math.max(5.0, Math.min(50.0, cam.r));
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        window.addEventListener('resize', resize);
        resize();

        // --- RENDER LOOP ---
        function loop() {
            // Calculate Camera Position (Spherical -> Cartesian)
            const cx = cam.r * Math.sin(cam.theta) * Math.sin(cam.phi);
            const cy = cam.r * Math.cos(cam.theta);
            const cz = cam.r * Math.sin(cam.theta) * Math.cos(cam.phi);
            
            // Calculate View Vectors (LookAt 0,0,0)
            const camPos = [cx, cy, cz];
            const target = [0, 0, 0];
            
            // Forward (Target - Pos)
            let fx = target[0] - cx, fy = target[1] - cy, fz = target[2] - cz;
            const fl = Math.sqrt(fx*fx + fy*fy + fz*fz);
            fx/=fl; fy/=fl; fz/=fl; // Normalize

            // Right (Cross WorldUP and Fwd)
            // World UP is (0,1,0)
            let rx = fz, ry = 0, rz = -fx; // Simplified cross product with (0,1,0)
            const rl = Math.sqrt(rx*rx + ry*ry + rz*rz);
            rx/=rl; ry/=rl; rz/=rl;

            // Up (Cross Right and Fwd)
            let ux = ry*fz - rz*fy;
            let uy = rz*fx - rx*fz;
            let uz = rx*fy - ry*fx;

            gl.uniform2f(uLocs.res, canvas.width, canvas.height);
            gl.uniform3f(uLocs.pos, cx, cy, cz);
            gl.uniform3f(uLocs.dir, fx, fy, fz);
            gl.uniform3f(uLocs.up, ux, uy, uz);
            
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
