<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Relativistic Accretion Engine</title>
    <!-- Use a clean, modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Inter', -apple-system, sans-serif;
            color: #fff;
            user-select: none;
        }
        
        /* Canvas Stacking */
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            display: block; 
        }
        #glCanvas { cursor: crosshair; }
        #uiCanvas { pointer-events: none; z-index: 5; }

        /* Modern Glassmorphism UI */
        .panel {
            position: absolute;
            background: rgba(10, 15, 22, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 24px;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .left-panel { top: 30px; left: 30px; width: 280px; }
        .right-panel { top: 30px; right: 30px; width: 260px; }

        h1 {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            margin: 0 0 20px 0;
            color: #fff;
        }
        h1 span { color: #00e5ff; font-weight: 300; }

        h2 {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin: 0 0 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 9px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-value { font-size: 13px; font-weight: 400; font-variant-numeric: tabular-nums; }
        .stat-value.highlight { color: #00e5ff; }

        #warning {
            color: #ff3366;
            font-size: 10px;
            letter-spacing: 1px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 16px;
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
        }
        #warning::before { content: "⚠"; margin-right: 8px; font-size: 14px; }
        #warning.active { opacity: 1; }

        /* Custom Input Styling */
        .control-group { margin-bottom: 16px; }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #00e5ff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            outline: none;
            cursor: pointer;
        }

        .instructions {
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.6;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 16px;
        }
        .instructions span { color: #fff; font-weight: 600; }
        
        #escapeIndicator {
            position: absolute; 
            font-size: 10px; 
            color: rgba(0, 229, 255, 0.8);
            pointer-events: none; 
            z-index: 10;
            transform: translate(15px, 15px);
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <!-- Left Panel: Telemetry & Stats -->
        <div class="panel left-panel">
            <h1>Accretion <span>Dynamics</span></h1>
            <h2>Observer Telemetry</h2>
            
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="stat-label">Distance</div>
                    <div class="stat-value" id="stat-dist">0.00 M</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Local Gravity</div>
                    <div class="stat-value" id="stat-grav">0.000 m/s²</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Time Dilation</div>
                    <div class="stat-value highlight" id="stat-time">100.0%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Event Horizon</div>
                    <div class="stat-value" id="stat-eh">0.0 M</div>
                </div>
            </div>
            
            <div id="warning">Spaghettification Imminent</div>
        </div>

        <!-- Right Panel: Interactive Controls -->
        <div class="panel right-panel">
            <h2>Simulation Parameters</h2>
            
            <div class="control-group">
                <label>Singularity Mass <span id="lbl-mass">1.5</span></label>
                <input type="range" id="mass-slider" min="0.5" max="3.5" step="0.1" value="1.5">
            </div>
            
            <div class="control-group">
                <label>Emission Intensity <span id="lbl-intensity">1.0x</span></label>
                <input type="range" id="intensity-slider" min="0.2" max="3.0" step="0.1" value="1.0">
            </div>

            <div class="control-group">
                <label style="margin-bottom: 8px;">Spectral Mapping</label>
                <select id="mode-select">
                    <option value="0">Thermal Blackbody</option>
                    <option value="1">Relativistic Redshift</option>
                </select>
            </div>
            
            <div class="instructions">
                <span>Left Click</span> to fire test particles into the gravity well.<br><br>
                <span>Drag</span> to orbit the observer camera.
            </div>
        </div>
    </div>

    <div id="escapeIndicator"></div>

    <!-- Separate canvases for WebGL and 2D overlays -->
    <canvas id="glCanvas"></canvas>
    <canvas id="uiCanvas"></canvas>

    <script id="fs" type="x-shader/x-fragment">
        precision highp float;

        uniform vec2 u_res;
        uniform vec3 u_camPos;
        uniform vec3 u_camDir;
        uniform vec3 u_camUp;
        uniform float u_time;
        uniform float u_bhMass;
        uniform int u_visMode;
        uniform float u_diskIntensity;

        #define MAX_STEPS 120
        #define DISK_IN 2.8
        #define DISK_OUT 9.0

        float hash(vec3 p) {
            return fract(sin(dot(p, vec3(12.9, 78.2, 54.1))) * 43758.5);
        }

        float getDiskTexture(vec3 p, float r) {
            float temp = 1.0 - smoothstep(DISK_IN, DISK_OUT, r);
            float turb = 0.5 + 0.5 * sin(r * 8.0 + u_time * 0.1) * sin(atan(p.z, p.x) * 6.0);
            float rings = 0.6 + 0.4 * sin(r * 12.0);
            rings = smoothstep(0.1, 0.9, rings);
            return (temp * 0.7 + turb * 0.3) * rings;
        }

        vec3 temperatureToColor(float temp) {
            if(temp < 0.3) return mix(vec3(0.2, 0.05, 0.0), vec3(0.8, 0.2, 0.05), temp / 0.3);
            else if(temp < 0.7) return mix(vec3(0.8, 0.2, 0.05), vec3(1.0, 0.9, 0.4), (temp - 0.3) / 0.4);
            else return mix(vec3(1.0, 0.9, 0.4), vec3(1.0, 1.0, 1.0), (temp - 0.7) / 0.3);
        }

        void main() {
            vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / u_res.y;
            
            vec3 fwd = normalize(u_camDir);
            vec3 right = normalize(cross(fwd, u_camUp));
            vec3 up = cross(right, fwd);
            vec3 rd = normalize(uv.x * right + uv.y * up + 1.5 * fwd);
            
            vec3 p = u_camPos;
            vec3 col = vec3(0.0);
            vec3 accumGlow = vec3(0.0);
            bool hitHorizon = false;

            for(int i = 0; i < MAX_STEPS; i++) {
                float r = length(p);
                
                if(r < u_bhMass) {
                    hitHorizon = true;
                    break;
                }
                
                float force = (u_bhMass * 2.5) / (r * r);
                vec3 gravity = normalize(-p);
                rd += gravity * force * 0.05;
                rd = normalize(rd);
                
                float dPlane = abs(p.y);
                
                if(dPlane < 0.2 && r > DISK_IN && r < DISK_OUT) {
                    float tex = getDiskTexture(p, r);
                    vec3 vel = normalize(vec3(-p.z, 0.0, p.x));
                    float dop = dot(rd, vel);
                    float temp = 1.0 - smoothstep(DISK_IN, DISK_OUT, r);
                    
                    vec3 pixelCol;
                    if(u_visMode == 1) {
                        pixelCol = vec3(1.0 - temp, 0.5, temp);
                    } else {
                        pixelCol = temperatureToColor(temp);
                    }
                    
                    float redshift = 1.0 + 0.3 * (u_bhMass / r);
                    pixelCol *= vec3(1.0 / redshift, 0.9 / (redshift * 0.7), 0.8 / (redshift * 1.2));
                    
                    float density = tex * exp(-dPlane * 10.0);
                    float beam = pow(1.0 + dop * 0.7, 2.0);
                    vec3 light = pixelCol * density * beam * 0.35 * u_diskIntensity;
                    accumGlow += light;
                }
                
                float step = max(0.05, r * 0.06);
                p += rd * step;
                
                if(r > 40.0) break;
            }
            
            if(!hitHorizon) {
                vec3 starDir = rd * 100.0;
                float s = hash(floor(starDir));
                if(s > 0.985) {
                    float brightness = pow(fract(s * 13.7), 2.0);
                    col += vec3(brightness);
                }
            }
            
            col += accumGlow;
            col = col / (col + vec3(0.5));
            col = pow(col, vec3(0.4545));
            
            gl_FragColor = vec4(col, 1.0);
        }
    </script>
    
    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 position;
        void main() { gl_Position = vec4(position, 0.0, 1.0); }
    </script>

    <script>
        // Grab canvases and contexts
        const glCanvas = document.getElementById("glCanvas");
        const uiCanvas = document.getElementById("uiCanvas");
        const gl = glCanvas.getContext("webgl");
        const ctx2d = uiCanvas.getContext("2d");

        // WebGL Setup
        function createShader(type, src) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
            return s;
        }
        
        const prog = gl.createProgram();
        gl.attachShader(prog, createShader(gl.VERTEX_SHADER, document.getElementById("vs").text));
        gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, document.getElementById("fs").text));
        gl.linkProgram(prog);
        gl.useProgram(prog);

        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        const posLoc = gl.getAttribLocation(prog, "position");
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

        const uLocs = {
            res: gl.getUniformLocation(prog, "u_res"),
            pos: gl.getUniformLocation(prog, "u_camPos"),
            dir: gl.getUniformLocation(prog, "u_camDir"),
            up: gl.getUniformLocation(prog, "u_camUp"),
            time: gl.getUniformLocation(prog, "u_time"),
            bhMass: gl.getUniformLocation(prog, "u_bhMass"),
            visMode: gl.getUniformLocation(prog, "u_visMode"),
            diskIntensity: gl.getUniformLocation(prog, "u_diskIntensity")
        };

        // State Variables
        const cam = { r: 18.0, theta: Math.PI / 2.2, phi: 0.4 };
        let bhMass = 1.5;
        let visMode = 0;
        let diskIntensity = 1.0;
        let particles = [];
        
        // Input tracking
        let mouseX = 0, mouseY = 0;
        let isDragging = false;
        let lastX = 0, lastY = 0;
        let dragDistance = 0;
        let startTime = Date.now();

        // UI Event Listeners
        document.getElementById('mass-slider').addEventListener('input', e => {
            bhMass = parseFloat(e.target.value);
            document.getElementById('lbl-mass').textContent = bhMass.toFixed(1);
        });
        
        document.getElementById('intensity-slider').addEventListener('input', e => {
            diskIntensity = parseFloat(e.target.value);
            document.getElementById('lbl-intensity').textContent = diskIntensity.toFixed(1) + 'x';
        });

        document.getElementById('mode-select').addEventListener('change', e => {
            visMode = parseInt(e.target.value);
        });

        // Mouse Controls
        glCanvas.addEventListener('mousedown', e => {
            isDragging = true;
            lastX = e.clientX; lastY = e.clientY;
            mouseX = e.clientX; mouseY = e.clientY;
            dragDistance = 0;
        });

        window.addEventListener('mouseup', e => {
            if(isDragging && dragDistance < 5) {
                // If it was a clean click, launch a particle!
                const p = launchParticle(e.clientX, e.clientY);
                particles.push(p);
            }
            isDragging = false;
        });

        window.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            if (!isDragging) return;
            
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            dragDistance += Math.sqrt(dx*dx + dy*dy);
            lastX = e.clientX;
            lastY = e.clientY;
            
            cam.phi -= dx * 0.005;
            cam.theta -= dy * 0.005;
            cam.theta = Math.max(0.1, Math.min(Math.PI - 0.1, cam.theta));
        });

        window.addEventListener('wheel', e => {
            cam.r += e.deltaY * 0.01;
            cam.r = Math.max(3.0, Math.min(50.0, cam.r));
        });

        // Particle Physics
        function launchParticle(clientX, clientY) {
            // Camera position
            const cx = cam.r * Math.sin(cam.theta) * Math.sin(cam.phi);
            const cy = cam.r * Math.cos(cam.theta);
            const cz = cam.r * Math.sin(cam.theta) * Math.cos(cam.phi);
            
            // Camera Basis vectors
            let fx = -cx, fy = -cy, fz = -cz;
            const fl = Math.sqrt(fx*fx + fy*fy + fz*fz);
            fx/=fl; fy/=fl; fz/=fl;

            let rx = fz, ry = 0, rz = -fx;
            const rl = Math.sqrt(rx*rx + ry*ry + rz*rz);
            rx/=rl; ry/=rl; rz/=rl;

            let ux = ry*fz - rz*fy;
            let uy = rz*fx - rx*fz;
            let uz = rx*fy - ry*fx;
            
            // Screen space projection (-1 to 1)
            const aspect = glCanvas.width / glCanvas.height;
            const screenX = ((clientX / glCanvas.width) - 0.5) * 2.0 * aspect;
            const screenY = -((clientY / glCanvas.height) - 0.5) * 2.0;
            
            // Determine exact 3D ray direction based on click
            let dx = rx * screenX + ux * screenY + fx * 1.5;
            let dy = ry * screenX + uy * screenY + fy * 1.5;
            let dz = rz * screenX + uz * screenY + fz * 1.5;
            
            const dl = Math.sqrt(dx*dx + dy*dy + dz*dz);
            const speed = 0.25; // Projectile speed
            
            return {
                pos: [cx, cy, cz],
                vel: [(dx/dl)*speed, (dy/dl)*speed, (dz/dl)*speed],
                history: [], // Trail data
                age: 0,
                life: 600
            };
        }

        function updateParticles() {
            for(let p of particles) {
                p.age++;
                
                // Record history for the glowing trail
                if (p.age % 2 === 0) {
                    p.history.push([...p.pos]);
                    if (p.history.length > 30) p.history.shift();
                }

                const dist = Math.sqrt(p.pos[0]*p.pos[0] + p.pos[1]*p.pos[1] + p.pos[2]*p.pos[2]);
                
                // Exaggerated gravitational pull for cinematic curves
                const pull = -bhMass * 6.0 / (dist * dist); 
                
                p.vel[0] += (p.pos[0] / dist) * pull * 0.02;
                p.vel[1] += (p.pos[1] / dist) * pull * 0.02;
                p.vel[2] += (p.pos[2] / dist) * pull * 0.02;
                
                p.pos[0] += p.vel[0];
                p.pos[1] += p.vel[1];
                p.pos[2] += p.vel[2];
            }
            
            // Remove dead particles or particles that cross the event horizon
            particles = particles.filter(p => p.age < p.life && Math.sqrt(p.pos[0]*p.pos[0] + p.pos[1]*p.pos[1] + p.pos[2]*p.pos[2]) > bhMass);
        }

        // Project 3D point to 2D screen coordinate
        function project3D(p3d, cx, cy, cz, fx, fy, fz, rx, ry, rz, ux, uy, uz) {
            const relPos = [ p3d[0] - cx, p3d[1] - cy, p3d[2] - cz ];
            const pZ = relPos[0] * fx + relPos[1] * fy + relPos[2] * fz;
            if (pZ < 0.1) return null; // Behind camera
            
            const pX = relPos[0] * rx + relPos[1] * ry + relPos[2] * rz;
            const pY = relPos[0] * ux + relPos[1] * uy + relPos[2] * uz;
            
            return {
                x: uiCanvas.width / 2 + (pX / pZ) * uiCanvas.height / 1.5,
                y: uiCanvas.height / 2 - (pY / pZ) * uiCanvas.height / 1.5
            };
        }

        function resize() {
            glCanvas.width = window.innerWidth;
            glCanvas.height = window.innerHeight;
            gl.viewport(0, 0, glCanvas.width, glCanvas.height);
            uiCanvas.width = window.innerWidth;
            uiCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function updateStats() {
            const cx = cam.r * Math.sin(cam.theta) * Math.sin(cam.phi);
            const cy = cam.r * Math.cos(cam.theta);
            const cz = cam.r * Math.sin(cam.theta) * Math.cos(cam.phi);
            const distance = Math.sqrt(cx*cx + cy*cy + cz*cz);
            
            const schwarzschildR = 2 * bhMass;
            const timeDialation = Math.sqrt(Math.max(0.01, 1 - schwarzschildR / distance));
            const gravity = (bhMass * 6.674) / (distance * distance);
            
            document.getElementById('stat-dist').textContent = distance.toFixed(2) + ' M';
            document.getElementById('stat-grav').textContent = gravity.toFixed(3) + ' m/s²';
            document.getElementById('stat-time').textContent = (timeDialation * 100).toFixed(1) + '%';
            document.getElementById('stat-eh').textContent = schwarzschildR.toFixed(1) + ' M';
            
            const warning = document.getElementById('warning');
            if(distance < 4.0) warning.classList.add('active');
            else warning.classList.remove('active');

            const indicator = document.getElementById('escapeIndicator');
            const escapeVel = Math.sqrt(2 * bhMass / (distance / 10));
            indicator.style.left = (mouseX + 15) + 'px';
            indicator.style.top = (mouseY + 15) + 'px';
            indicator.textContent = 'vE: ' + escapeVel.toFixed(1) + ' km/s';
        }

        function loop() {
            updateParticles();
            
            // Clear the separate 2D context for a fresh transparent frame
            ctx2d.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
            
            const cx = cam.r * Math.sin(cam.theta) * Math.sin(cam.phi);
            const cy = cam.r * Math.cos(cam.theta);
            const cz = cam.r * Math.sin(cam.theta) * Math.cos(cam.phi);
            
            let fx = -cx, fy = -cy, fz = -cz;
            const fl = Math.sqrt(fx*fx + fy*fy + fz*fz);
            fx/=fl; fy/=fl; fz/=fl;

            let rx = fz, ry = 0, rz = -fx;
            const rl = Math.sqrt(rx*rx + ry*ry + rz*rz);
            rx/=rl; ry/=rl; rz/=rl;

            let ux = ry*fz - rz*fy;
            let uy = rz*fx - rx*fz;
            let uz = rx*fy - ry*fx;

            gl.uniform2f(uLocs.res, glCanvas.width, glCanvas.height);
            gl.uniform3f(uLocs.pos, cx, cy, cz);
            gl.uniform3f(uLocs.dir, fx, fy, fz);
            gl.uniform3f(uLocs.up, ux, uy, uz);
            gl.uniform1f(uLocs.time, (Date.now() - startTime) * 0.001);
            gl.uniform1f(uLocs.bhMass, bhMass);
            gl.uniform1i(uLocs.visMode, visMode);
            gl.uniform1f(uLocs.diskIntensity, diskIntensity);
            
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            
            // Render glowing particle trails on 2D canvas
            for(let p of particles) {
                const alpha = 1.0 - (p.age / p.life);
                
                // Draw trailing path
                if(p.history.length > 1) {
                    ctx2d.beginPath();
                    let started = false;
                    for(let hp of p.history) {
                        let proj = project3D(hp, cx,cy,cz, fx,fy,fz, rx,ry,rz, ux,uy,uz);
                        if(proj) {
                            if(!started) { ctx2d.moveTo(proj.x, proj.y); started = true; }
                            else { ctx2d.lineTo(proj.x, proj.y); }
                        }
                    }
                    // Connect to current head position
                    let headProj = project3D(p.pos, cx,cy,cz, fx,fy,fz, rx,ry,rz, ux,uy,uz);
                    if(headProj && started) ctx2d.lineTo(headProj.x, headProj.y);
                    
                    ctx2d.strokeStyle = `rgba(0, 229, 255, ${alpha * 0.8})`;
                    ctx2d.lineWidth = 2;
                    ctx2d.lineCap = "round";
                    ctx2d.lineJoin = "round";
                    ctx2d.shadowBlur = 8;
                    ctx2d.shadowColor = '#00e5ff';
                    ctx2d.stroke();
                }
                
                // Draw bright comet head
                let headProj = project3D(p.pos, cx,cy,cz, fx,fy,fz, rx,ry,rz, ux,uy,uz);
                if(headProj) {
                    ctx2d.beginPath();
                    ctx2d.arc(headProj.x, headProj.y, 3, 0, Math.PI * 2);
                    ctx2d.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx2d.shadowBlur = 12;
                    ctx2d.shadowColor = '#00e5ff';
                    ctx2d.fill();
                }
            }
            
            // Reset shadow to avoid affecting other UI elements accidentally
            ctx2d.shadowBlur = 0;
            
            updateStats();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
