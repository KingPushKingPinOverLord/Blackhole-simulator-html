<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Black Hole Sim</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; user-select: none; }
        canvas { position: absolute; top: 0; left: 0; display: block; }
        
        #hud {
            position: absolute; top: 20px; left: 20px;
            width: 250px; z-index: 10; pointer-events: none;
        }
        
        .box {
            border: 2px solid #fff; background: #000; padding: 15px; margin-bottom: 15px;
            pointer-events: auto;
        }

        .title { font-weight: bold; border-bottom: 2px solid #fff; padding-bottom: 10px; margin-bottom: 15px; letter-spacing: 1px;}
        
        .row { margin-bottom: 12px; font-size: 12px; }
        .val { float: right; }
        
        input[type=range] {
            -webkit-appearance: none; width: 100%; height: 2px; background: #555; margin-top: 10px; outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 16px; background: #fff; cursor: pointer;
        }

        button {
            width: 100%; background: #000; color: #fff; border: 2px solid #fff; 
            padding: 8px; font-family: monospace; cursor: pointer; margin-top: 10px; font-weight: bold;
        }
        button:hover { background: #fff; color: #000; }
        
        #warn { color: #f00; border-color: #f00; display: none; text-align: center; font-weight: bold; }
        
        #cross {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            border-left: 1px solid #fff; border-top: 1px solid #fff; z-index: 5;
            transform: translate(-50%, -50%); opacity: 0.5; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="cross"></div>
    <canvas id="c_gl"></canvas>
    <canvas id="c_2d" style="pointer-events: none; z-index: 5;"></canvas>

    <div id="hud">
        <div class="box">
            <div class="title">ACCRETION_SIM v1.3</div>
            <div class="row">MASS <span class="val" id="v_mass">1.5</span>
                <input type="range" id="i_mass" min="0.5" max="3" step="0.1" value="1.5">
            </div>
            <div class="row">LUM <span class="val" id="v_lum">1.0</span>
                <input type="range" id="i_lum" min="0" max="3" step="0.1" value="1.0">
            </div>
            <button id="b_mode">MODE: THERMAL</button>
        </div>
        
        <div class="box">
            <div class="row">DIST <span class="val" id="s_dist">0.0</span></div>
            <div class="row">DILATION <span class="val" id="s_time">100%</span></div>
            <div class="row">ORBS <span class="val" id="s_orbs">0</span></div>
        </div>
        
        <div class="box" id="warn">! TIDAL FORCES HIGH !</div>
    </div>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 pos;
        void main() { gl_Position = vec4(pos, 0.0, 1.0); }
    </script>

    <script id="fs" type="x-shader/x-fragment">
        precision highp float;
        uniform vec2 res;
        uniform vec3 cam_p, cam_d, cam_u;
        uniform float t, mass, lum;
        uniform int mode;

        float rand(vec3 p) { return fract(sin(dot(p, vec3(12.9898, 78.233, 54.53))) * 43758.5453); }

        vec3 palette(float x) {
            if(x < 0.3) return mix(vec3(0.2, 0., 0.), vec3(0.8, 0.2, 0.), x/0.3);
            if(x < 0.7) return mix(vec3(0.8, 0.2, 0.), vec3(1., 0.9, 0.4), (x-0.3)/0.4);
            return mix(vec3(1., 0.9, 0.4), vec3(1.), (x-0.7)/0.3);
        }

        void main() {
            vec2 uv = (gl_FragCoord.xy - 0.5 * res) / res.y;
            vec3 fwd = normalize(cam_d);
            vec3 right = normalize(cross(fwd, cam_u));
            vec3 up = cross(right, fwd);
            vec3 rd = normalize(uv.x * right + uv.y * up + 1.5 * fwd);

            vec3 p = cam_p;
            vec3 col = vec3(0.);
            vec3 glow = vec3(0.);
            bool isHole = false;

            for(int i=0; i<150; i++) {
                float r = length(p);
                if(r < mass) { isHole = true; break; }
                if(r > 150.0) break;

                vec3 grav = -p / r;
                float f = (mass * 2.5) / (r*r);
                rd = normalize(rd + grav * f * 0.05);

                float y_dist = abs(p.y);
                if(y_dist < 0.2 && r > 2.8 && r < 9.0) {
                    float tex = 1. - smoothstep(2.8, 9., r);
                    float turb = 0.5 + 0.5 * sin(r*8. + t*0.1) * sin(atan(p.z, p.x)*6.);
                    float val = (tex*0.7 + turb*0.3) * smoothstep(0.1, 0.9, 0.6+0.4*sin(r*12.));

                    vec3 vel = normalize(vec3(-p.z, 0., p.x));
                    float dop = dot(rd, vel);
                    
                    vec3 baseC = mode == 1 ? vec3(1.-tex, 0.5, tex) : palette(tex);
                    float rs = 1.0 + 0.3 * (mass / r);
                    baseC *= vec3(1./rs, 0.9/(rs*0.7), 0.8/(rs*1.2));

                    glow += baseC * val * exp(-y_dist*10.) * pow(1. + dop*0.7, 2.) * 0.35 * lum;
                }
                
                p += rd * max(0.05, r*0.06);
            }

            if(!isHole) {
                float s = rand(floor(rd * 100.));
                if(s > 0.98) col += pow(fract(s*13.7), 2.);
            }

            col += glow;
            gl_FragColor = vec4(pow(col / (col + 0.5), vec3(0.45)), 1.);
        }
    </script>

    <script>
        const c1 = document.getElementById("c_gl");
        const c2 = document.getElementById("c_2d");
        const gl = c1.getContext("webgl");
        const ctx = c2.getContext("2d");

        const el = id => document.getElementById(id);
        let mass = 1.5, lum = 1.0, mode = 0;
        
        el("i_mass").oninput = e => { mass = +e.target.value; el("v_mass").innerText = mass.toFixed(1); };
        el("i_lum").oninput = e => { lum = +e.target.value; el("v_lum").innerText = lum.toFixed(1); };
        el("b_mode").onclick = () => { mode = mode === 0 ? 1 : 0; el("b_mode").innerText = mode === 0 ? "MODE: THERMAL" : "MODE: REDSHIFT"; };

        const compile = (type, id) => {
            const s = gl.createShader(type);
            gl.shaderSource(s, el(id).text);
            gl.compileShader(s);
            return s;
        };
        const pgm = gl.createProgram();
        gl.attachShader(pgm, compile(gl.VERTEX_SHADER, "vs"));
        gl.attachShader(pgm, compile(gl.FRAGMENT_SHADER, "fs"));
        gl.linkProgram(pgm);
        gl.useProgram(pgm);

        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        const pLoc = gl.getAttribLocation(pgm, "pos");
        gl.enableVertexAttribArray(pLoc);
        gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

        const locs = {
            res: gl.getUniformLocation(pgm, "res"),
            cam_p: gl.getUniformLocation(pgm, "cam_p"),
            cam_d: gl.getUniformLocation(pgm, "cam_d"),
            cam_u: gl.getUniformLocation(pgm, "cam_u"),
            t: gl.getUniformLocation(pgm, "t"),
            mass: gl.getUniformLocation(pgm, "mass"),
            lum: gl.getUniformLocation(pgm, "lum"),
            mode: gl.getUniformLocation(pgm, "mode")
        };

        let cam = { r: 22, th: 1.4, phi: 0.4 };
        let orbs = [];
        let isDown = false, mx = 0, my = 0, clickT = 0;
        let startT = Date.now();

        window.onmousedown = e => { isDown = true; mx = e.clientX; my = e.clientY; clickT = Date.now(); };
        window.onmouseup = e => {
            isDown = false;
            if(Date.now() - clickT < 200) spawnOrb(e.clientX, e.clientY);
        };
        window.onmousemove = e => {
            if(!isDown) return;
            cam.phi -= (e.clientX - mx) * 0.005;
            cam.th -= (e.clientY - my) * 0.005;
            cam.th = Math.max(0.1, Math.min(3.04, cam.th));
            mx = e.clientX; my = e.clientY;
        };
        window.onwheel = e => { cam.r = Math.max(4, Math.min(80, cam.r + e.deltaY * 0.015)); };

        const resize = () => {
            c1.width = c2.width = innerWidth;
            c1.height = c2.height = innerHeight;
            gl.viewport(0, 0, c1.width, c1.height);
        };
        window.onresize = resize;
        resize();

        function spawnOrb(cx, cy) {
            let cp = [cam.r*Math.sin(cam.th)*Math.sin(cam.phi), cam.r*Math.cos(cam.th), cam.r*Math.sin(cam.th)*Math.cos(cam.phi)];
            let l = Math.hypot(...cp);
            let f = [-cp[0]/l, -cp[1]/l, -cp[2]/l];
            let r = [f[2], 0, -f[0]];
            let rl = Math.hypot(r[0], r[2]);
            r = [r[0]/rl, 0, r[2]/rl];
            let u = [r[1]*f[2] - r[2]*f[1], r[2]*f[0] - r[0]*f[2], r[0]*f[1] - r[1]*f[0]];

            let sx = ((cx / c1.width) - 0.5) * 2.0 * (c1.width/c1.height);
            let sy = -((cy / c1.height) - 0.5) * 2.0;

            let dx = r[0]*sx + u[0]*sy + f[0]*1.5;
            let dy = r[1]*sx + u[1]*sy + f[1]*1.5;
            let dz = r[2]*sx + u[2]*sy + f[2]*1.5;
            let dl = Math.hypot(dx, dy, dz);

            let ray = [dx/dl, dy/dl, dz/dl];
            let start = [cp[0] + ray[0]*cam.r*0.5, cp[1] + ray[1]*cam.r*0.5, cp[2] + ray[2]*cam.r*0.5];
            
            let speed = 0.08;
            orbs.push({ p: start, v: [ray[0]*speed, ray[1]*speed, ray[2]*speed] });
        }

        function run() {
            ctx.clearRect(0, 0, c2.width, c2.height);
            
            let cp = [cam.r*Math.sin(cam.th)*Math.sin(cam.phi), cam.r*Math.cos(cam.th), cam.r*Math.sin(cam.th)*Math.cos(cam.phi)];
            let l = Math.hypot(...cp);
            let f = [-cp[0]/l, -cp[1]/l, -cp[2]/l];
            let r = [f[2], 0, -f[0]];
            let rl = Math.hypot(r[0], r[2]);
            r = [r[0]/rl, 0, r[2]/rl];
            let u = [r[1]*f[2] - r[2]*f[1], r[2]*f[0] - r[0]*f[2], r[0]*f[1] - r[1]*f[0]];

            gl.uniform2f(locs.res, c1.width, c1.height);
            gl.uniform3f(locs.cam_p, cp[0], cp[1], cp[2]);
            gl.uniform3f(locs.cam_d, f[0], f[1], f[2]);
            gl.uniform3f(locs.cam_u, u[0], u[1], u[2]);
            gl.uniform1f(locs.t, (Date.now() - startT) * 0.001);
            gl.uniform1f(locs.mass, mass);
            gl.uniform1f(locs.lum, lum);
            gl.uniform1i(locs.mode, mode);
            
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            for(let i = orbs.length - 1; i >= 0; i--) {
                let o = orbs[i];
                let dist = Math.hypot(o.p[0], o.p[1], o.p[2]);
                
                if(dist < mass * 1.01) {
                    orbs.splice(i, 1);
                    continue;
                }

                let pull = (-mass * 2.5) / (dist*dist);
                o.v[0] = (o.v[0] + (o.p[0]/dist)*pull*0.02) * 0.998;
                o.v[1] = (o.v[1] + (o.p[1]/dist)*pull*0.02) * 0.998;
                o.v[2] = (o.v[2] + (o.p[2]/dist)*pull*0.02) * 0.998;
                o.p[0] += o.v[0]; o.p[1] += o.v[1]; o.p[2] += o.v[2];

                // occlusion check
                let dc = Math.hypot(o.p[0]-cp[0], o.p[1]-cp[1], o.p[2]-cp[2]);
                if(dc > l) {
                    let ray = [(o.p[0]-cp[0])/dc, (o.p[1]-cp[1])/dc, (o.p[2]-cp[2])/dc];
                    let pd = Math.hypot(ray[1]*-cp[2] - ray[2]*-cp[1], ray[2]*-cp[0] - ray[0]*-cp[2], ray[0]*-cp[1] - ray[1]*-cp[0]);
                    if(pd < mass) continue; 
                }

                let fade = Math.max(0, Math.min(1, (dist - mass * 1.05) / (mass * 0.5)));
                if(fade <= 0.01) continue;

                let rsF = Math.max(0, Math.min(1, mass / dist));
                let cR = Math.floor(255 * (1 - Math.pow(rsF, 5)));
                let cG = Math.floor(255 * Math.pow(1 - rsF, 2));
                let cB = Math.floor(255 * Math.pow(1 - rsF, 4));

                let stretch = 1 + Math.pow(mass / dist, 4) * 200;
                let ln = 0.1 * stretch;
                let dir = [o.p[0]/dist, o.p[1]/dist, o.p[2]/dist];
                
                let p1 = [o.p[0] - dir[0]*ln, o.p[1] - dir[1]*ln, o.p[2] - dir[2]*ln];
                let p2 = [o.p[0] + dir[0]*ln, o.p[1] + dir[1]*ln, o.p[2] + dir[2]*ln];

                const proj = (pt) => {
                    let rel = [pt[0]-cp[0], pt[1]-cp[1], pt[2]-cp[2]];
                    let pZ = rel[0]*f[0] + rel[1]*f[1] + rel[2]*f[2];
                    if(pZ < 0.1) return null;
                    let pX = rel[0]*r[0] + rel[1]*r[1] + rel[2]*r[2];
                    let pY = rel[0]*u[0] + rel[1]*u[1] + rel[2]*u[2];
                    return { x: c2.width/2 + (pX/pZ)*c2.height/1.5, y: c2.height/2 - (pY/pZ)*c2.height/1.5 };
                };

                let s1 = proj(p1), s2 = proj(p2);
                if(s1 && s2) {
                    let thk = Math.max(0.5, 5 / Math.sqrt(stretch));
                    ctx.beginPath();
                    ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y);
                    ctx.strokeStyle = `rgba(${cR},${cG},${cB},${fade})`;
                    ctx.lineWidth = thk; ctx.lineCap = "round";
                    ctx.stroke();
                    
                    if(stretch < 5) {
                        let sc = proj(o.p);
                        if(sc) {
                            ctx.beginPath();
                            ctx.arc(sc.x, sc.y, Math.max(1, thk*0.5), 0, 7);
                            ctx.fillStyle = `rgba(255,255,255,${fade})`;
                            ctx.fill();
                        }
                    }
                }
            }

            el("s_dist").innerText = l.toFixed(1);
            el("s_time").innerText = (Math.sqrt(Math.max(0.001, 1 - mass/l)) * 100).toFixed(0) + "%";
            el("s_orbs").innerText = orbs.length;
            el("warn").style.display = l < 4 ? "block" : "none";

            requestAnimationFrame(run);
        }
        run();
    </script>
</body>
</html>
